on:
  pull_request:
  push:
    branches:
      - main


jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: lint

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: lint markdown
        run: pnpm lint:md

      - name: lint spell
        run: pnpm lint:spell

      - name: lint text
        run: pnpm lint:text
