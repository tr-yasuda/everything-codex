on:
  pull_request:
  push:
    branches:
      - main


jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: lint

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: lint markdown
        run: pnpm lint:md

      - name: lint spell
        run: pnpm lint:spell

      - name: lint text
        run: pnpm lint:text
