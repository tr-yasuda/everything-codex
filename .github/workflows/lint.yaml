on:
  pull_request:
  push:
    branches:
      - main


jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: lint

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: lint markdown
        run: pnpm lint:md

      - name: lint spell
        run: pnpm lint:spell

      - name: lint text
        run: pnpm lint:text
