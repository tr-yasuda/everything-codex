name: Pinact Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

concurrency:
  group: pinact-update
  cancel-in-progress: false

jobs:
  pinact-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PINACT_PR_TOKEN: ${{ secrets.PINACT_PR_TOKEN }}
    steps:
      - name: Fail if PAT is missing
        if: env.PINACT_PR_TOKEN == ''
        run: |
          echo "PINACT_PR_TOKEN is required."
          echo "Use a token that can push workflow file changes and open pull requests."
          exit 1

      - name: Checkout default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ env.PINACT_PR_TOKEN }}
          persist-credentials: false

      - name: Update pinned actions
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          github_token: ${{ env.PINACT_PR_TOKEN }}
          skip_push: "true"

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ env.PINACT_PR_TOKEN }}
          branch-token: ${{ env.PINACT_PR_TOKEN }}
          base: main
          branch: automation/pinact-update
          delete-branch: true
          commit-message: "chore: update pinned GitHub Actions"
          title: "chore: update pinned GitHub Actions"
          body: |
            ## 概要
            Pinact による GitHub Actions / reusable workflow の自動更新です。

            ## 変更内容
            - `.github/workflows/**` と `.pinact.yaml` の参照を最新の固定 SHA に更新

            ## 確認事項
            - [ ] ワークフロー差分を確認した
            - [ ] 自動生成差分で問題ないことを確認した
          labels: |
            dependencies
            github-actions
